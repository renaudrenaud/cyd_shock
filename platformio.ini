; CYD Shock — G-Shock BLE time server for ESP32-2432S028 (Cheap Yellow Display)
; Board: ESP32-2432S028 (2.8" 320x240 ILI9341 TFT + XPT2046 touch)

[env:esp32-cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    bblanchon/ArduinoJson @ ^7.3.1
    h2zero/NimBLE-Arduino @ ^1.4.2

board_build.filesystem = littlefs

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
